<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}EvalBot{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/static/evalbot.js"></script>
  <style>
    :root {
      --navy: #1e3a5f;
      --gold: #f5a623;
    }
    body { background-color: #f8fafc; }
    .badge-emerald { background:#d1fae5; color:#065f46; }
    .badge-blue    { background:#dbeafe; color:#1e40af; }
    .badge-orange  { background:#fed7aa; color:#9a3412; }
    .badge-amber   { background:#fef3c7; color:#92400e; }
    .badge-red     { background:#fee2e2; color:#991b1b; }
    .badge-gray    { background:#f3f4f6; color:#374151; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header style="background-color: #1e3a5f;" class="shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
      <a href="/" class="flex items-center gap-3">
        <span class="text-xl font-bold text-white tracking-wide">EvalBot</span>
        <span class="text-xs text-blue-300 font-medium ml-1">AI Venture Analyst</span>
      </a>
      <nav class="flex items-center gap-6">
        <a href="/" class="text-blue-200 hover:text-white text-sm font-medium transition-colors">Dashboard</a>
        <a href="/run" class="flex items-center gap-1.5 text-sm font-medium" style="color: #f5a623;">&#9654; Run Batch</a>
        <a href="/roadmap" class="text-blue-200 hover:text-white text-sm font-medium transition-colors">Roadmap</a>
      </nav>
    </div>
  </header>

  <!-- Page content -->
  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer style="background-color: #1e3a5f;" class="mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-4 text-center text-blue-300 text-xs">
      EvalBot &middot; Multi-Agent AI Venture Analysis &middot; Internal Tool
    </div>
  </footer>

</body>
</html>
