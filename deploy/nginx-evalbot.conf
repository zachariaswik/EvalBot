server {
    listen 80;
    listen [::]:80;
    server_name _;

    # --- Basic Auth ---
    auth_basic "EvalBot";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location /static/ {
        alias /opt/evalbot/frontend/static/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Backend routes: long-running SSE stream for batch runs
    location /api/run {
        proxy_pass http://127.0.0.1:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 1800s;
    }

    # WebSocket endpoint (Reflex state) — backend on 8000, needs upgrade headers
    location /_event/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # All other backend routes (ping, upload, etc.)
    location ~ ^/(_upload|_ping|api)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Frontend (React, compiled static app) — served by Node on 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
