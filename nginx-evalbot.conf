server {
    listen 80;
    listen [::]:80;
    server_name _;

    # --- IP allowlist ---
    # Add more IPs with additional allow lines. To add a subnet: allow 2a0c:5a86:f603:2801::/64;
    allow 2a0c:5a86:f603:2801::36de;
    deny all;

    # --- Basic Auth ---
    auth_basic "EvalBot";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location /static/ {
        alias /opt/evalbot/frontend/static/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
